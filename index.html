<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odhis Enterprise Typing Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header>
            <div class="status-bar">
                <span id="system-status">● SYSTEM_READY</span>
                <span id="high-score">System Record: 0 WPM</span>
            </div>
        </header>

        <main id="terminal-container">
            <div class="terminal-header">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span class="title">bash — practice_session.sh</span>
                <select id="mode-selector" style="background: #161b22; color: #7d8590; border: 1px solid #30363d; border-radius: 4px; margin-left: 15px; font-family: monospace; font-size: 12px; cursor: pointer;">
                    <option value="practice_data.json">K8s_MODE</option>
                    <option value="practice_regular.json">REGULAR_MODE</option>
                </select>
            </div>

            <div id="stats-container">
                <div class="stat-box">TIME: <span id="timer">60</span>s</div>
                <div class="stat-box">WPM: <span id="wpm">0</span></div>
            </div>
            
            <div id="text-display">Initializing Kubernetes modules...</div>

            <div class="stats-footer">
                <div class="stat-box">
                    <label>WPM</label>
                    <span id="wpm">0</span>
                </div>
                <div class="stat-box">
                    <label>ACCURACY</label>
                    <span id="accuracy">100%</span>
                </div>
            </div>

            <div id="virtual-keyboard">
                <div class="keyboard-row">
                    <div class="key" id="key-q">Q</div><div class="key" id="key-w">W</div>
                    <div class="key" id="key-e">E</div><div class="key" id="key-r">R</div>
                    <div class="key" id="key-t">T</div><div class="key" id="key-y">Y</div>
                    <div class="key" id="key-u">U</div><div class="key" id="key-i">I</div>
                    <div class="key" id="key-o">O</div><div class="key" id="key-p">P</div>
                </div>                
                <div class="keyboard-row">
                    <div class="key" id="key-a">A</div><div class="key" id="key-s">S</div>
                    <div class="key" id="key-d">D</div><div class="key" id="key-f">F</div>
                    <div class="key" id="key-g">G</div><div class="key" id="key-h">H</div>
                    <div class="key" id="key-j">J</div><div class="key" id="key-k">K</div>
                    <div class="key" id="key-l">L</div><div class="key" id="key-semicolon">;</div>
                </div>

                <div class="keyboard-row">
                    <div class="key" id="key-z">Z</div><div class="key" id="key-x">X</div>
                    <div class="key" id="key-c">C</div><div class="key" id="key-v">V</div>
                    <div class="key" id="key-b">B</div><div class="key" id="key-n">N</div>
                    <div class="key" id="key-m">M</div>
                    <div class="key" id="key-space">SPACE</div>
                </div>
            </div>
            <div id="leaderboard-section">
                <div class="leaderboard-header">SYSTEM_RANKINGS</div>
                <table id="leaderboard-table">
                    <thead>
                        <tr>
                            <th>RANK</th>
                            <th>WPM</th>
                            <th>ACCURACY</th>
                            <th>DATE</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        </tbody>
                </table>
                
                <div class="controls">
                    <button id="reset-btn" class="btn secondary" style="border-color: #da3633; color: #da3633;">_FACTORY_RESET</button>
                </div>
            </div>
        </main>

        <section class="controls">
            <button id="next-btn" class="btn">_NEXT_COMMAND</button>
        </section>
    </div>

    <input type="text" id="input-field" autofocus autocomplete="off" spellcheck="false">
    

    <script src="app.js"></script>
</body>
</html>
